name: Discord issue close follow-up

on:
  issues:
    types: [closed]

permissions:
  contents: read
  issues: read

jobs:
  notify-discord:
    name: Ask Discord reporter to verify fix
    if: contains(github.event.issue.labels.*.name, 'source:discord')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2

      - name: Post Discord follow-up
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          # Optional repo/org Actions variable holding the #bugreports channel id.
          # When set, the follow-up links it as a <#id> mention; unset arrives as
          # "" and the script falls back to a plain "#bugreports".
          DISCORD_BUGREPORTS_CHANNEL_ID: ${{ vars.DISCORD_BUGREPORTS_CHANNEL_ID }}
        run: bun scripts/notify-discord-issue-closed.ts
